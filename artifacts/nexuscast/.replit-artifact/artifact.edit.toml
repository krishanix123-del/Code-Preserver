kind = "web"
previewPath = "/"
title = "NexusCast - Stream Dashboard"
version = "1.0.0"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19783

[services.development]
run = "pnpm --filter @workspace/nexuscast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexuscast", "run", "build" ]
publicDir = "artifacts/nexuscast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19783"
BASE_PATH = "/"
